==============================================================================
WUTA-FSD 仿真器 — 8字绕环测试赛道定义
规则：两个同心圆成八字形排列，圆心距18.25m
内圆直径15.25m，外圆直径21.25m，赛道宽3m
先跑右圆2圈（顺时针），再跑左圆2圈（逆时针）
蓝色锥桶：内圈内恻边界
黄色锥桶：内圈外侧边界
==============================================================================
track:
  type: skidpad
  start_pose:
    x: 9.125
    y: -10.625
