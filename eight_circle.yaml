  # 两圆切点处（中间交叉口）
  crossover_cones:
    - [0.0, 0.0, 0.0]  # 中心切点
  
  # 赛道参数
  parameters:
    center_distance: 18.25   # 圆心距 (m)
    inner_diameter: 15.25    # 内圆直径 (m)
    outer_diameter: 21.25    # 外圆直径 (m)
    inner_radius: 7.625      # 内圆半径 (m)
    outer_radius: 10.625     # 外圆半径 (m)
    track_width: 3.0         # 赛道宽度 (m)
    laps:
      right_circle: 2        # 右圆圈数
      left_circle: 2         # 左圆圈数